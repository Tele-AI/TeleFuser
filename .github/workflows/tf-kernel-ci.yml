name: TF-Kernel CI

on:
  push:
    branches: [main, develop]
    paths:
      - "tf-kernel/**"
      - ".github/workflows/tf-kernel-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "tf-kernel/**"
      - ".github/workflows/tf-kernel-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python and package checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tf-kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check tools
        run: python -m pip install isort ruff==0.11.7

      - name: Check imports
        run: isort --check-only --diff tf_kernel tests benchmark scripts

      - name: Check undefined Python names
        run: ruff check --select F821 tf_kernel tests benchmark scripts

      - name: Validate package metadata
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          metadata = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = metadata["project"]
          assert project["name"] == "tf-kernel"
          assert project["version"]
          assert "torch==2.11.0" in project["dependencies"]
          PY

      - name: Check version command
        run: python scripts/set_version.py --help

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tf-kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install documentation dependencies
        run: |
          python -m pip install "sphinx>=7.0" "sphinx-rtd-theme>=2.0" "sphinx-autodoc-typehints>=1.25"

      - name: Build documentation
        env:
          SPHINX_AUTODOC_MOCK_MODULES: tf_kernel
        run: make docs

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: tf-kernel-documentation
          path: tf-kernel/docs/build/html
          if-no-files-found: error
