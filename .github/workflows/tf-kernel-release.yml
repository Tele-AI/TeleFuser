name: Publish TF-Kernel to PyPI

on:
  push:
    tags:
      - "tf-kernel-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build CUDA 12.8 wheel
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate release tag
        if: github.ref_type == 'tag'
        working-directory: tf-kernel
        run: |
          package_version="$(python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          expected_tag="tf-kernel-v${package_version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match ${expected_tag}" >&2
            exit 1
          fi

      - name: Build wheel
        working-directory: tf-kernel
        run: bash build.sh 3.10 12.8 x86_64

      - name: Check wheel metadata
        run: |
          python3 -m pip install twine
          python3 -m twine check tf-kernel/dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: tf-kernel-wheel-cu128
          path: tf-kernel/dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: tf-kernel-pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: tf-kernel-wheel-cu128
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
