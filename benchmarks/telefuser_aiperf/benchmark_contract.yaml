contract_version: v1
name: telefuser_aiperf_video
mode: batch_video
implementation: telefuser
model_family: wan_video
model: Wan2.1-I2V-14B-480P
supported_tasks:
  - i2v
transport: http
endpoint:
  path: /v1/videos
  protocol: openai_video_generation
request_encoding:
  content_type: multipart/form-data
  media_inputs:
    first_image_path: input_reference
  parameters:
    prompt: prompt
    negative_prompt: negative_prompt
    seed: seed
    size: size
    seconds: seconds
result_delivery:
  polling_path: /v1/videos/{id}
  content_path: /v1/videos/{id}/content
workload:
  resolution: 832x480
  frames: 81
  inference_steps: 40
  fps: 16
  guidance_scale: 5.0
metrics:
  - request_latency
  - completion_latency
  - download_latency
  - request_throughput
  - success_rate
artifacts:
  config: benchmarks/telefuser_aiperf/configs/video_generation_wan21_i2v_480p_compare.yaml
  dataset: benchmarks/telefuser_aiperf/data/video_prompts.jsonl
